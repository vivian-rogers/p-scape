# Single-city OSRM stack. Run as:
#   CITY=austin docker compose up -d        (or any other key from pnorm/cities.py)
#   CITY=nyc    docker compose up -d
# To switch cities, `docker compose down` first.

services:
  osrm-car:
    image: osrm/osrm-backend:latest
    container_name: pnorm-osrm-car
    # -t N: explicit thread count for the HTTP listener. The Docker default
    # picks up the VM's reported core count, which on macOS often defaults
    # to 2-4 regardless of host hardware. With K=48 jittered Monte Carlo
    # sampling we want real parallel /table throughput, so set it explicitly
    # to 8 (leave 2 cores for the asyncio client on a 10-core host).
    command: osrm-routed --algorithm mld --max-table-size 10000 --threads 8 /data/${CITY:-austin}.osrm
    ports:
      - "5001:5000"
    volumes:
      - ./data/osrm-car-${CITY:-austin}:/data
    restart: unless-stopped

  osrm-foot:
    image: osrm/osrm-backend:latest
    container_name: pnorm-osrm-foot
    command: osrm-routed --algorithm mld --max-table-size 10000 --threads 8 /data/${CITY:-austin}.osrm
    ports:
      - "5002:5000"
    volumes:
      - ./data/osrm-foot-${CITY:-austin}:/data
    restart: unless-stopped
